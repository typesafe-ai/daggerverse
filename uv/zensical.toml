[project]
site_name = "uv — Dagger module"
site_description = "A Dagger module for uv-managed Python projects and workspaces: audit, build, and package."
site_url = "https://typesafe-ai.github.io/daggerverse/uv/"

nav = [
  { "Overview" = "index.md" },
  { "Building containers" = "building.md" },
  { "Virtual environments" = "virtual-environments.md" },
  { "Checks" = [
    { "Auditing dependencies" = "checks/audit.md" },
  ] },
]

[project.theme]
features = [
  "content.code.copy",
  "content.code.annotate",
  "content.tabs.link",
  "navigation.sections",
  "navigation.footer",
  "navigation.top",
]

# The first palette is the default; slate (dark) leads so the site loads in dark mode.
[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
