name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DAGGER_VERSION: "0.20.6"

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    permissions:
      checks: read
    steps:
      - name: Wait for Dagger Cloud checks
        uses: lewagon/wait-on-check-action@v1.6.1
        with:
          # On pull_request events, github.sha is the synthesized merge commit;
          # external checks (Dagger Cloud) attach to the PR head commit instead.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          check-regexp: ^daggerverse:uv-workspace-
          wait-interval: 5
          allowed-conclusions: success
          checks-discovery-timeout: 120
