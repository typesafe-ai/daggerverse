name: Publish to Daggerverse

on:
  push:
    tags: ["*/v[0-9]*"]

env:
  DAGGER_VERSION: "0.21.4"

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Extract module from tag
        id: meta
        run: echo "module=${GITHUB_REF_NAME%%/v*}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          persist-credentials: false

      - name: Install Dagger
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
        with:
          version: ${{ env.DAGGER_VERSION }}
          install-only: true

      - name: Publish ${{ steps.meta.outputs.module }}
        run: dagger publish -m "./${MODULE}"
        env:
          MODULE: ${{ steps.meta.outputs.module }}
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
