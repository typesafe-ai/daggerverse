{% extends "base.html" %}

{% block extrahead %}
  <style>
    .md-header__inner {
      position: relative;
    }
    .md-header__daggerverse {
      position: absolute;
      left: 45%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: .8rem;
      font-weight: 700;
      white-space: nowrap;
      z-index: 1;
    }
    .md-header__daggerverse a {
      color: var(--md-primary-bg-color);
      text-decoration: none;
      opacity: .8;
      transition: opacity .25s;
    }
    .md-header__daggerverse a:hover {
      opacity: 1;
    }
  </style>
{% endblock %}
