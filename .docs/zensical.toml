[project]
site_name = "Typesafe Daggerverse"
site_description = "Shared Dagger modules published from the typesafe-ai daggerverse."
site_url = "https://typesafe-ai.github.io/daggerverse/"
site_author = "Typesafe AI"
repo_url = "https://github.com/typesafe-ai/daggerverse"
repo_name = "typesafe-ai/daggerverse"
edit_uri = "edit/main/.docs/docs/"
copyright = "Copyright &copy; 2026 Typesafe AI"

nav = [
  { "Home" = "index.md" },
]

[project.theme]
features = [
  "content.action.edit",
  "navigation.footer",
  "navigation.top",
]

# Dark mode leads, matching the per-module docs.
[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.toc]
permalink = true
