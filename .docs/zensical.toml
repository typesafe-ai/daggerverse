[project]
site_name = "Typesafe Daggerverse"
site_description = "Shared Dagger modules published from the typesafe-ai daggerverse."

nav = [
  { "Home" = "index.md" },
]

[project.theme]
features = [
  "navigation.footer",
  "navigation.top",
]

# Dark mode leads, matching the per-module docs.
[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.toc]
permalink = true
