[project]
site_name = "ruff — Dagger module"
site_description = "A Dagger module for linting and formatting Python code with Ruff."
site_url = "https://typesafe-ai.github.io/daggerverse/ruff/"
site_author = "Typesafe AI"
repo_url = "https://github.com/typesafe-ai/daggerverse"
repo_name = "typesafe-ai/daggerverse"
edit_uri = "edit/main/ruff/docs/"
copyright = "Copyright &copy; 2026 Typesafe AI"

nav = [
  { "Overview" = "index.md" },
]

[project.theme]
custom_dir = "overrides"
features = [
  "content.action.edit",
  "content.code.copy",
  "content.code.annotate",
  "content.tabs.link",
  "navigation.sections",
  "navigation.footer",
  "navigation.top",
]

# The first palette is the default; slate (dark) leads so the site loads in dark mode.
[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
